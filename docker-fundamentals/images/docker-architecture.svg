<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Docker architecture</title>
<desc>Docker CLI sends REST API calls to dockerd, which uses containerd, containerd-shim, and runc to run containers, and pulls/pushes images to a registry.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif;}
.box{fill:#E6F1FB;stroke:#185FA5;stroke-width:1;}
.box2{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1;}
.box3{fill:#FAECE7;stroke:#993C1D;stroke-width:1;}
.th{font-size:14px;font-weight:bold;fill:#042C53;}
.t{font-size:13px;fill:#04342C;}
.ts{font-size:11px;fill:#712B13;}
.arr{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#arrow);}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5"/></marker></defs>

<rect x="40" y="40" width="140" height="52" rx="8" class="box"/>
<text x="110" y="60" text-anchor="middle" class="th">Docker CLI</text>
<text x="110" y="78" text-anchor="middle" class="t">docker build/run</text>

<rect x="240" y="20" width="220" height="360" rx="16" fill="none" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="40" text-anchor="middle" class="th">Docker host</text>

<rect x="260" y="60" width="180" height="44" rx="8" class="box2"/>
<text x="350" y="86" text-anchor="middle" class="t">dockerd (daemon)</text>

<rect x="260" y="124" width="180" height="44" rx="8" class="box2"/>
<text x="350" y="150" text-anchor="middle" class="t">containerd</text>

<rect x="260" y="188" width="180" height="44" rx="8" class="box2"/>
<text x="350" y="214" text-anchor="middle" class="t">containerd-shim</text>

<rect x="260" y="252" width="180" height="44" rx="8" class="box2"/>
<text x="350" y="278" text-anchor="middle" class="t">runc</text>

<rect x="260" y="316" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
<text x="350" y="342" text-anchor="middle" class="t">Container process</text>

<rect x="520" y="60" width="120" height="52" rx="8" class="box3"/>
<text x="580" y="80" text-anchor="middle" class="th">Registry</text>
<text x="580" y="98" text-anchor="middle" class="ts">Docker Hub/ECR</text>

<line x1="180" y1="66" x2="258" y2="70" class="arr"/>
<line x1="350" y1="104" x2="350" y2="122" class="arr"/>
<line x1="350" y1="168" x2="350" y2="186" class="arr"/>
<line x1="350" y1="232" x2="350" y2="250" class="arr"/>
<line x1="350" y1="296" x2="350" y2="314" class="arr"/>
<line x1="438" y1="80" x2="518" y2="82" class="arr"/>
<line x1="518" y1="96" x2="438" y2="92" class="arr"/>
<text x="478" y="72" text-anchor="middle" class="ts">push</text>
<text x="478" y="106" text-anchor="middle" class="ts">pull</text>
</svg>
