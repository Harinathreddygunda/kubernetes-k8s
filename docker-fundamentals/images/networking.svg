<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Docker network drivers</title>
<desc>Docker supports bridge, host, none, and overlay network drivers.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif;}
.b1{fill:#E6F1FB;stroke:#185FA5;}
.b2{fill:#E1F5EE;stroke:#0F6E56;}
.b3{fill:#F1EFE8;stroke:#5F5E5A;}
.b4{fill:#EEEDFE;stroke:#534AB7;}
.th{font-size:14px;font-weight:bold;}
.ts{font-size:11px;}
.arr{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#arrow);}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5"/></marker></defs>

<rect x="40" y="40" width="140" height="56" rx="8" class="b1"/>
<text x="110" y="62" text-anchor="middle" class="th" fill="#042C53">Bridge</text>
<text x="110" y="80" text-anchor="middle" class="ts" fill="#0C447C">Default, per-host NAT</text>

<rect x="200" y="40" width="140" height="56" rx="8" class="b2"/>
<text x="270" y="62" text-anchor="middle" class="th" fill="#04342C">Host</text>
<text x="270" y="80" text-anchor="middle" class="ts" fill="#085041">Shares host network</text>

<rect x="360" y="40" width="140" height="56" rx="8" class="b3"/>
<text x="430" y="62" text-anchor="middle" class="th" fill="#2C2C2A">None</text>
<text x="430" y="80" text-anchor="middle" class="ts" fill="#444441">No networking</text>

<rect x="520" y="40" width="120" height="56" rx="8" class="b4"/>
<text x="580" y="62" text-anchor="middle" class="th" fill="#26215C">Overlay</text>
<text x="580" y="80" text-anchor="middle" class="ts" fill="#3C3489">Multi-host</text>

<rect x="60" y="150" width="200" height="120" rx="12" fill="none" stroke="#185FA5"/>
<text x="160" y="170" text-anchor="middle" class="th" fill="#0C447C">Custom bridge net</text>

<rect x="80" y="190" width="70" height="40" rx="6" class="b3"/>
<text x="115" y="214" text-anchor="middle" font-size="12" fill="#2C2C2A">web</text>

<rect x="190" y="190" width="70" height="40" rx="6" class="b3"/>
<text x="225" y="214" text-anchor="middle" font-size="12" fill="#2C2C2A">db</text>

<line x1="150" y1="210" x2="188" y2="210" class="arr"/>
<text x="168" y="200" text-anchor="middle" class="ts" fill="#444441">by name</text>

<text x="450" y="240" text-anchor="middle" class="ts" fill="#444441">Containers on a custom bridge network</text>
<text x="450" y="256" text-anchor="middle" class="ts" fill="#444441">resolve each other by container name (DNS)</text>
</svg>
